name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "development" ]
  pull_request:
    branches: [ "main", "master", "development" ]

jobs:
  lint-and-test:
    name: Lint & Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Lint Backend with Ruff
        run: |
          # Verify backend code quality. If there are severe errors, this catches them.
          # Allow to continue but warn for now to avoid blocking initial pipelines on legacy formatting.
          ruff check backend/ || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build Next.js Frontend
        run: |
          cd frontend
          npm run build

  build-docker:
    name: Docker Build Verification
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: processity-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: processity-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to cloned repository
            cd /home/${{ secrets.AWS_USER }}/processity-ai-mail
            
            # Fetch latest changes from github cleanly
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            
            # Write environment variables to backend/.env dynamically
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > backend/.env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> backend/.env
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> backend/.env
            echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> backend/.env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> backend/.env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> backend/.env
            echo "IMAP_HOST=${{ secrets.IMAP_HOST }}" >> backend/.env
            echo "IMAP_PORT=${{ secrets.IMAP_PORT }}" >> backend/.env
            echo "DATABASE_URL=postgresql://postgres:password123@db:5432/processity" >> backend/.env
            
            # Restart containers with the new build
            sudo docker-compose down
            sudo docker-compose up -d --build

